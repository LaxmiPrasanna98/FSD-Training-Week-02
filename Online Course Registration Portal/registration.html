<!DOCTYPE html>
<html>
<head>
<title>Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">Course Registration Form</h2>

<form onsubmit="showAlert(event)">

<input type="text" class="form-control mb-3" placeholder="Student Name" required>

<input type="email" class="form-control mb-3" placeholder="Email" required>

<input type="tel" class="form-control mb-3" placeholder="Mobile Number" required>

<select class="form-select mb-3">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select class="form-select mb-3">
<option>Web Development</option>
<option>Python Programming</option>
<option>Data Science</option>
<option>AI & ML</option>
<option>Java Programming</option>
<option>Cloud Computing</option>
</select>

<input type="text" class="form-control mb-3" placeholder="Qualification">

<textarea class="form-control mb-3" placeholder="Address"></textarea>

<input type="file" class="form-control mb-3">

<div class="form-check mb-3">
<input type="checkbox" class="form-check-input" required>
<label>I Agree to Terms & Conditions</label>
</div>

<button class="btn btn-primary">Register</button>

</form>

<div id="successAlert" class="alert alert-success mt-3 d-none">
Registration Successful!
</div>

</div>

<script>
function showAlert(e){
e.preventDefault();
document.getElementById("successAlert").classList.remove("d-none");
}
</script>

</body>
</html>
