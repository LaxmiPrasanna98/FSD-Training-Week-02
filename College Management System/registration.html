</head>

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white text-center">

                    <h2>
                        Event Registration Form
                    </h2>

                </div>

                <div class="card-body">

                    <form id="registrationForm">

                       

                        <div class="mb-3">

                            <label class="form-label">
                                Student Name
                            </label>

                            <input type="text"
                                   id="studentName"
                                   class="form-control"
                                   placeholder="Enter Your Name"
                                   required>

                        </div>

                       

                        <div class="mb-3">

                            <label class="form-label">
                                Roll Number
                            </label>

                            <input type="text"
                                   id="rollNumber"
                                   class="form-control"
                                   placeholder="Enter Roll Number"
                                   required>

                        </div>

                       

                        <div class="mb-3">

                            <label class="form-label">
                                Branch
                            </label>

                            <select id="branch"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Branch
                                </option>

                                <option>
                                    CSE
                                </option>

                                <option>
                                    ECE
                                </option>

                                <option>
                                    EEE
                                </option>

                                <option>
                                    Mechanical
                                </option>

                                <option>
                                    Civil
                                </option>

                                <option>
                                    IT
                                </option>

                            </select>

                        </div>

                        

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email"
                                   id="email"
                                   class="form-control"
                                   placeholder="Enter Email"
                                   required>

                        </div>

                       

                        <div class="mb-3">

                            <label class="form-label">
                                Mobile Number
                            </label>

                            <input type="tel"
                                   id="mobile"
                                   class="form-control"
                                   placeholder="Enter Mobile Number"
                                   required>

                        </div>

                       

                        <div class="mb-3">

                            <label class="form-label">
                                Select Event
                            </label>

                            <select id="event"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Choose Event
                                </option>

                                <option>
                                    Technical Quiz
                                </option>

                                <option>
                                    Hackathon
                                </option>

                                <option>
                                    Poster Presentation
                                </option>

                                <option>
                                    Coding Contest
                                </option>

                                <option>
                                    Project Expo
                                </option>

                                <option>
                                    Cultural Fest
                                </option>

                            </select>

                        </div>


                        <div class="mb-3">

                            <label class="form-label d-block">
                                Gender
                            </label>

                            <div class="form-check form-check-inline">

                                <input class="form-check-input"
                                       type="radio"
                                       name="gender"
                                       required>

                                <label class="form-check-label">
                                    Male
                                </label>

                            </div>

                            <div class="form-check form-check-inline">

                                <input class="form-check-input"
                                       type="radio"
                                       name="gender">

                                <label class="form-check-label">
                                    Female
                                </label>

                            </div>

                        </div>

                       

                        <div class="form-check mb-3">

                            <input class="form-check-input"
                                   type="checkbox"
                                   required>

                            <label class="form-check-label">

                                I agree to all rules and regulations

                            </label>

                        </div>

                     

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Register Now

                        </button>

                    </form>

                   
                    <div id="successMessage"></div>

                </div>

            </div>

        </div>

    </div>

</section>



<footer>

    <p class="mb-0">
        © <span id="year"></span>
        College Event Management System
    </p>

</footer>
