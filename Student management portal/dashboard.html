<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">

    <h1 class="text-center mb-5">Student Dashboard</h1>

    <div class="row g-4 mb-5">

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h2 id="totalStudents">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>CSE Students</h5>
                    <h2 id="cseStudents">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Other Branches</h5>
                    <h2 id="otherStudents">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Average Attendance</h5>
                    <h2 id="avgAttendance">0%</h2>
                </div>
            </div>
        </div>

    </div>

    
    <div class="row mb-4">
        <div class="col-md-8">
            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search Student Name..."
            >
        </div>

        <div class="col-md-4 text-end">
            <button class="btn btn-success" id="addStudentBtn">
                Add Student
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center">

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Branch</th>
                    <th>Attendance</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>Prasanna</td>
                    <td>5M3</td>
                    <td>CSE</td>
                    <td>97%</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Vani</td>
                    <td>5Q6</td>
                    <td>CSE</td>
                    <td>91%</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Nishivika</td>
                    <td>7F6</td>
                    <td>CSE</td>
                    <td>85%</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Mani</td>
                    <td>5F4</td>
                    <td>EEE</td>
                    <td>75%</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Parii</td>
                    <td>5T9</td>
                    <td>Civil</td>
                    <td>60%</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Priya</td>
                    <td>5T0</td>
                    <td>MECH</td>
                    <td>65%</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

function updateDashboard() {

    let rows = document.querySelectorAll("tbody tr");

    let total = rows.length;
    let cse = 0;
    let attendanceSum = 0;

    rows.forEach(function(row){

        let branch = row.cells[2].innerText;
        let attendance = parseInt(row.cells[3].innerText);

        if(branch === "CSE"){
            cse++;
        }

        attendanceSum += attendance;
    });

    let other = total - cse;

    let avg = total > 0
        ? Math.round(attendanceSum / total)
        : 0;

    document.getElementById("totalStudents").innerText = total;
    document.getElementById("cseStudents").innerText = cse;
    document.getElementById("otherStudents").innerText = other;
    document.getElementById("avgAttendance").innerText = avg + "%";
}



document.getElementById("searchInput")
.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let rows = document.querySelectorAll("tbody tr");

    rows.forEach(function(row){

        let name =
            row.cells[0].innerText.toLowerCase();

        if(name.includes(value)){
            row.style.display = "";
        }
        else{
            row.style.display = "none";
        }

    });

});



document.querySelector("tbody")
.addEventListener("click", function(e){

    // Delete
    if(e.target.classList.contains("delete-btn")){

        if(confirm("Delete this student?")){

            e.target.closest("tr").remove();

            updateDashboard();
        }
    }

  
    if(e.target.classList.contains("edit-btn")){

        let row = e.target.closest("tr");

        let currentName =
            row.cells[0].innerText;

        let newName =
            prompt("Enter New Name", currentName);

        if(newName){
            row.cells[0].innerText = newName;
        }
    }

});



document.getElementById("addStudentBtn")
.addEventListener("click", function(){

    let name = prompt("Enter Student Name");

    if(name){

        let roll =
            prompt("Enter Roll Number");

        let branch =
            prompt("Enter Branch");

        let attendance =
            prompt("Enter Attendance %");

        let tbody =
            document.querySelector("tbody");

        let row =
            document.createElement("tr");

        row.innerHTML = `
            <td>${name}</td>
            <td>${roll}</td>
            <td>${branch}</td>
            <td>${attendance}%</td>
            <td>
                <button class="btn btn-warning btn-sm edit-btn">
                    Edit
                </button>

                <button class="btn btn-danger btn-sm delete-btn">
                    Delete
                </button>
            </td>
        `;

        tbody.appendChild(row);

        updateDashboard();
    }

});



updateDashboard();

</script>

</body>
</html>
