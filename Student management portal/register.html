<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h2 class="text-center mb-4">Student Registration Form</h2>

        <form id="control-form">

           
            <div class="mb-3">
                <label for="name" class="form-label">
                    <strong>Enter your Name:</strong>
                </label>
                <input type="text" class="form-control" id="name"
                       placeholder="Enter your name" required>
            </div>

       
            <div class="mb-3">
                <label for="rollno" class="form-label">
                    <strong>Roll No:</strong>
                </label>
                <input type="text" class="form-control" id="rollno"
                       placeholder="Enter your Roll Number" required>
            </div>

            
            <div class="mb-3">
                <label for="email" class="form-label">
                    <strong>Email Address:</strong>
                </label>
                <input type="email" class="form-control" id="email"
                       placeholder="name@example.com" required>
            </div>

          
            <div class="mb-3">
                <label class="form-label">
                    <strong>Mobile Number:</strong>
                </label>
                <div class="input-group">
                    <span class="input-group-text">+91</span>
                    <input type="tel" class="form-control"
                           placeholder="Enter 10-digit mobile number"
                           pattern="[0-9]{10}" required>
                </div>
            </div>

           
            <label class="form-label">
                <strong>Gender:</strong>
            </label>

            <div class="form-check">
                <input class="form-check-input" type="radio"
                       name="gender" id="male">
                <label class="form-check-label" for="male">
                    Male
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio"
                       name="gender" id="female">
                <label class="form-check-label" for="female">
                    Female
                </label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="radio"
                       name="gender" id="other">
                <label class="form-check-label" for="other">
                    Other
                </label>
            </div>

<div class="mb-3">
    <select class="form-select" required aria-label="select example">
      <option value="">Select Your Branch</option>
      <option value="1">CSE</option>
      <option value="2">CSM</option>
      <option value="3">CSD</option>
      <option value="4">CSC</option>
    </select>
    <div class="invalid-feedback">Example invalid select feedback</div>
  </div>
  <div class="mb-3">
    <label for="dob" class="form-label">
        <strong>Date of Birth:</strong>
    </label>
    <input type="date" class="form-control" id="dob" required>
</div>
         <div class="mb-3">
    <label for="inputAddress2" class="form-label">Address 2</label>
    <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
  </div>
  <div class="mb-3">
    <label for="inputCity" class="form-label">City</label>
    <input type="text" class="form-control" id="inputCity">
  </div>
  <div class="mb-3">
    <label for="photo" class="form-label">
        <strong>Upload Photo:</strong>
    </label>
    <input type="file" class="form-control" id="photo"
           accept="image/*" required>

    <div class="invalid-feedback">
        Please upload an image.
    </div>
</div>
<div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="terms" required>
    <label class="form-check-label" for="terms">
        I agree to the Terms and Conditions
    </label>
</div>

        </form>
        <button type="submit" class="btn btn-outline-primary" form="contact-form">Register</button>

    </div>
    <script>
        document.getElementById("control-form").addEventListener("submit",function(e){
         e.preventDefault();
         alert("Your are successfully Registered");
        })
    </script>

</body>
</html>
